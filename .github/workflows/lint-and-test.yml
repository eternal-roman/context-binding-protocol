name: Lint and Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'impl/**'
      - '.github/workflows/lint-and-test.yml'

jobs:
  typescript:
    name: TypeScript — typecheck + lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: impl/ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
